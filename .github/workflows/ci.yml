name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python 3.11)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Algorithm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Algorithm/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          # DB disabled — no DATABASE_URL set; DB-dependent tests self-skip
          RUN_INTEGRATION: "0"
        run: |
          pytest tests/ -q --tb=short \
            --ignore=tests/test_migrations_runner.py \
            -k "not test_fetch_news_items_deduplicates_multi_source_items \
                and not test_strategy_graph_run_without_db \
                and not test_strategy_graph_engine_basic"
